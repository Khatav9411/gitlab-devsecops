################################################################################
# GitLab DevSecOps pipeline (GitOps): build -> scan -> push (Docker Hub).
#
# Deployment to AKS is handled by Argo CD + Argo CD Image Updater running in
# the cluster. The updater polls Docker Hub, sees the new image tag this
# pipeline pushes, and updates the Argo Application — no Azure creds in CI.
#
# Required CI/CD variables (Settings -> CI/CD -> Variables, all Protected):
#   DOCKERHUB_USERNAME      (masked: no)
#   DOCKERHUB_TOKEN         (masked: yes)
################################################################################

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

stages:
  - validate
  - test
  - build
  - scan

variables:
  IMAGE_REPO: "docker.io/${DOCKERHUB_USERNAME}/myapp"
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"
  CS_IMAGE: "${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
  CS_REGISTRY_USER: "${DOCKERHUB_USERNAME}"
  CS_REGISTRY_PASSWORD: "${DOCKERHUB_TOKEN}"

# ----------------------------------------------------------------------------
# Validate
# ----------------------------------------------------------------------------
lint:dockerfile:
  stage: validate
  image: hadolint/hadolint:latest-debian
  script:
    - hadolint Dockerfile
  rules:
    - changes: [Dockerfile]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint:k8s:
  stage: validate
  image:
    name: alpine/k8s:1.30.4
    entrypoint: [""]
  script:
    - kubectl --dry-run=client apply -f k8s/namespace.yaml
    - kubectl --dry-run=client apply -f k8s/service.yaml
    - kubectl --dry-run=client apply -f k8s/deployment.yaml
  rules:
    - changes: [k8s/**/*]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ----------------------------------------------------------------------------
# Test
# ----------------------------------------------------------------------------
unit:node:
  stage: test
  image: node:20-alpine
  cache:
    key:
      files: [app/package.json]
    paths: [app/node_modules/]
  before_script:
    - cd app && npm install --no-audit --no-fund
  script:
    - node --check src/index.js
  rules:
    - changes: [app/**/*]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ----------------------------------------------------------------------------
# Build + push (rootless, with Kaniko)
# ----------------------------------------------------------------------------
build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')"
          }
        }
      }
      EOF
    - /kaniko/executor
        --context "${CI_PROJECT_DIR}"
        --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
        --destination "${IMAGE_REPO}:${CI_COMMIT_SHORT_SHA}"
        --destination "${IMAGE_REPO}:latest"
        --cache=true
        --snapshot-mode=redo
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ----------------------------------------------------------------------------
# Scan: container_scanning runs against CS_IMAGE after build.
# ----------------------------------------------------------------------------
container_scanning:
  stage: scan
  needs: [build:image]
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
