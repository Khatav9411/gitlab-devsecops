################################################################################
# GitLab DevSecOps pipeline (GitOps): build -> scan -> push (Docker Hub).
#
# Builds three images in parallel (myapp, todoapi, todofrontend) and runs
# container scanning on each. Deployment is handled by Argo CD + Image Updater
# in the cluster, not by this pipeline.
#
# Required CI/CD variables (Settings -> CI/CD -> Variables, all Protected):
#   DOCKERHUB_USERNAME      (masked: no)
#   DOCKERHUB_TOKEN         (masked: yes)
################################################################################

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

stages:
  - validate
  - test
  - build
  - scan

variables:
  CS_REGISTRY_USER:     "${DOCKERHUB_USERNAME}"
  CS_REGISTRY_PASSWORD: "${DOCKERHUB_TOKEN}"

# ----------------------------------------------------------------------------
# Validate
# ----------------------------------------------------------------------------
lint:dockerfile:
  stage: validate
  image: hadolint/hadolint:latest-debian
  script:
    - hadolint Dockerfile
    - hadolint todoapp/api/Dockerfile
    - hadolint todoapp/frontend/Dockerfile
  rules:
    - changes:
        - Dockerfile
        - todoapp/**/Dockerfile
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint:k8s:
  stage: validate
  image:
    name: alpine/k8s:1.30.4
    entrypoint: [""]
  script:
    - kubectl kustomize k8s/         > /tmp/myapp.yaml
    - kubectl kustomize k8s/todoapp/ > /tmp/todoapp.yaml
    - wc -l /tmp/myapp.yaml /tmp/todoapp.yaml
  rules:
    - changes: [k8s/**/*]
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ----------------------------------------------------------------------------
# Test
# ----------------------------------------------------------------------------
unit:node:
  stage: test
  image: node:20-alpine
  parallel:
    matrix:
      - { APP_DIR: app,          ENTRY: src/index.js }
      - { APP_DIR: todoapp/api,  ENTRY: src/index.js }
  cache:
    key:
      files: ["$APP_DIR/package.json"]
    paths: ["$APP_DIR/node_modules/"]
  before_script:
    - cd $APP_DIR && npm install --no-audit --no-fund
  script:
    - node --check $ENTRY
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ----------------------------------------------------------------------------
# Build + push (rootless, with Kaniko). Matrix builds three images in parallel.
# ----------------------------------------------------------------------------
build:image:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  parallel:
    matrix:
      - { IMG: myapp,        CTX: ".",                DOCKERFILE: "Dockerfile" }
      - { IMG: todoapi,      CTX: "todoapp/api",      DOCKERFILE: "todoapp/api/Dockerfile" }
      - { IMG: todofrontend, CTX: "todoapp/frontend", DOCKERFILE: "todoapp/frontend/Dockerfile" }
  script:
    - mkdir -p /kaniko/.docker
    - |
      cat > /kaniko/.docker/config.json <<EOF
      {
        "auths": {
          "https://index.docker.io/v1/": {
            "auth": "$(printf '%s:%s' "$DOCKERHUB_USERNAME" "$DOCKERHUB_TOKEN" | base64 | tr -d '\n')"
          }
        }
      }
      EOF
    - /kaniko/executor
        --context    "${CI_PROJECT_DIR}/${CTX}"
        --dockerfile "${CI_PROJECT_DIR}/${DOCKERFILE}"
        --destination "docker.io/${DOCKERHUB_USERNAME}/${IMG}:${CI_COMMIT_SHORT_SHA}"
        --destination "docker.io/${DOCKERHUB_USERNAME}/${IMG}:latest"
        --cache=true
        --snapshot-mode=redo
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

# ----------------------------------------------------------------------------
# Container scan each image. The template-defined job is parameterised here
# with parallel:matrix so we get one report per image.
# ----------------------------------------------------------------------------
container_scanning:
  stage: scan
  needs:
    - job: build:image
      artifacts: false
  parallel:
    matrix:
      - CS_IMAGE: "docker.io/${DOCKERHUB_USERNAME}/myapp:${CI_COMMIT_SHORT_SHA}"
      - CS_IMAGE: "docker.io/${DOCKERHUB_USERNAME}/todoapi:${CI_COMMIT_SHORT_SHA}"
      - CS_IMAGE: "docker.io/${DOCKERHUB_USERNAME}/todofrontend:${CI_COMMIT_SHORT_SHA}"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
