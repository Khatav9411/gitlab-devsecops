name: Build Scan Push Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Image Tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t kamleshcloud/myapp:${IMAGE_TAG} .
          docker tag kamleshcloud/myapp:${IMAGE_TAG} kamleshcloud/myapp:latest

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kamleshcloud/myapp:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0

      - name: Push Image
        run: |
          docker push kamleshcloud/myapp:${IMAGE_TAG}
          docker push kamleshcloud/myapp:latest