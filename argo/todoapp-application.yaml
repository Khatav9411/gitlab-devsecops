apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todoapp
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Image Updater watches BOTH images and rewrites kustomization.yaml's
    # images: block via the Argo Application override.
    argocd-image-updater.argoproj.io/image-list: >-
      api=docker.io/siddhuge/todoapi,
      frontend=docker.io/siddhuge/todofrontend
    argocd-image-updater.argoproj.io/api.update-strategy:      newest-build
    argocd-image-updater.argoproj.io/api.allow-tags:           regexp:^[0-9a-f]{8}$
    argocd-image-updater.argoproj.io/api.pull-secret:          pullsecret:argocd/dockerhub-creds
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.allow-tags:      regexp:^[0-9a-f]{8}$
    argocd-image-updater.argoproj.io/frontend.pull-secret:     pullsecret:argocd/dockerhub-creds
    argocd-image-updater.argoproj.io/write-back-method:        argocd
spec:
  project: default
  source:
    repoURL:        https://github.com/Khatav9411/gitlab-devsecops.git
    targetRevision: main
    path:           k8s/todoapp
  destination:
    server:    https://kubernetes.default.svc
    namespace: todoapp
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
