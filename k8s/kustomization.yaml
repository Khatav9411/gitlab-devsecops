apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myapp

# cluster-issuer.yaml is intentionally NOT here — it's a cluster-scoped
# resource managed once at cluster bootstrap, not by the app's Argo Application.
resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# Argo CD Image Updater rewrites this block on every new tag it sees.
images:
  - name: docker.io/siddhuge/myapp
    newTag: 6ea765bc
