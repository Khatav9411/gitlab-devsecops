apiVersion: apps/v1
kind: Deployment
metadata:
  name: todoapi
  namespace: todoapp
  labels:
    app.kubernetes.io/name: todoapi
    app.kubernetes.io/part-of: todoapp
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: todoapi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todoapi
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: todoapi
      automountServiceAccountToken: true # required so the federated token is injected
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: dockerhub-secret
      terminationGracePeriodSeconds: 30
      containers:
        - name: todoapi
          image: docker.io/kamleshcloud/todoapi:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: COSMOS_ENDPOINT
              value: "https://kamlesh-todo-cosmos.documents.azure.com:443/"
            - name: COSMOS_DATABASE
              value: "todoapp"
            - name: COSMOS_CONTAINER
              value: "todos"
          resources:
            requests: { cpu: "50m",  memory: "128Mi" }
            limits:   { cpu: "300m", memory: "256Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 40
            periodSeconds: 2
