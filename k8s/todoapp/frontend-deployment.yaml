apiVersion: apps/v1
kind: Deployment
metadata:
  name: todofrontend
  namespace: todoapp
  labels:
    app.kubernetes.io/name: todofrontend
    app.kubernetes.io/part-of: todoapp
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: todofrontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: todofrontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user in nginx-unprivileged
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
        - name: nginx
          image: docker.io/siddhuge/todofrontend:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests: { cpu: "20m", memory: "32Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /, port: http }
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir: {}
