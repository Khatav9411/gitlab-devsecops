################################################################################
# Demo: pulls "myapp-demo-secret" from Azure Key Vault into a K8s Secret in
# the myapp namespace, then exposes it to the myapp pods as an env var.
#
# The SecretStore lives in the myapp namespace; ESO running in the
# external-secrets namespace uses workload identity (UAMI) to authenticate
# against the vault.
################################################################################

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-kv
  namespace: myapp
spec:
  provider:
    azurekv:
      # Real values are templated in by Terraform output / pipeline.
      # If you ever regenerate the cluster, update these.
      vaultUrl: "https://kv-aks-poc-039d77.vault.azure.net/"
      tenantId: "27c0839f-2761-40e0-9454-0ff9475691c3"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: external-secrets
        namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: myapp-demo
  namespace: myapp
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: azure-kv
    kind: SecretStore
  target:
    name: myapp-demo
    creationPolicy: Owner
  data:
    - secretKey: DEMO_SECRET
      remoteRef:
        key: myapp-demo-secret
